{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Sistema</title>
    
    <link rel="stylesheet" href="{% static 'bootstrap/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>

<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="row w-100 justify-content-center">
        <div class="col-md-5">

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger p-2 small text-center shadow-sm mb-3">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}


            <div id="login-card" class="card shadow p-4 rounded-3">
                <h2 class="text-center fw-bold mb-4 text-accent">Iniciar Sesión</h2>
                
                <form method="POST" action="{% url 'login' %}">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="login-username" class="form-label fw-semibold">Usuario o Correo</label>
                        <input type="text" class="form-control" id="login-username" name="username" placeholder="Ingresa tu usuario o correo" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="login-password" class="form-label fw-semibold">Contraseña</label>
                        <input type="password" class="form-control" id="login-password" name="password" placeholder="••••••••" required>
                    </div>
                    
                    <button type="submit" class="btn btn-custom w-100 fw-bold mt-2">Ingresar</button>
                </form>

                <div class="text-center mt-4">
                    <p class="mb-0 small text-muted">¿No tienes una cuenta aún?</p>
                    <button type="button" class="btn btn-link btn-sm text-success fw-bold p-0" onclick="mostrarRegistro()">Regístrate aquí</button>
                </div>
            </div>


            <div id="register-card" class="card shadow p-4 rounded-3 d-none">
                <h2 class="text-center fw-bold mb-4 text-accent">Crear Cuenta</h2>
                
                <form method="POST" action="{% url 'register' %}">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="reg-username" class="form-label fw-semibold">Nombre de Usuario</label>
                        <input type="text" class="form-control" id="reg-username" name="username" placeholder="Ej. jhoan_dev" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="reg-email" class="form-label fw-semibold">Correo Electrónico</label>
                        <input type="email" class="form-control" id="reg-email" name="correo" placeholder="correo@ejemplo.com" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="reg-password" class="form-label fw-semibold">Contraseña</label>
                        <input type="password" class="form-control" id="reg-password" name="password" placeholder="Crea una contraseña segura" required>
                    </div>

                    <button type="submit" class="btn btn-custom w-100 fw-bold mt-2">Registrarme</button>
                </form>

                <div class="text-center mt-4">
                    <p class="mb-0 small text-muted">¿Ya tienes cuenta?</p>
                    <button type="button" class="btn btn-link btn-sm text-success fw-bold p-0" onclick="mostrarLogin()">Iniciar Sesión</button>
                </div>
            </div>

        </div>
    </div>
</div>


<script>
    // Referencias globales a los contenedores de las tarjetas
    const loginCard = document.getElementById('login-card');
    const registerCard = document.getElementById('register-card');

    /**
     * Oculta la vista de Inicio de Sesión y despliega el formulario de Registro
     */
    function mostrarRegistro() {
        loginCard.classList.add('d-none');
        registerCard.classList.remove('d-none');
    }

    /**
     * Oculta la vista de Registro y despliega el formulario de Inicio de Sesión
     */
    function mostrarLogin() {
        registerCard.classList.add('d-none');
        loginCard.classList.remove('d-none');
    }
</script>

<script src="{% static 'bootstrap/js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
