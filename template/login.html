{% extends 'base.html' %}
{% load static %}

{% block title %}Acceso al Sistema - Safe Zone{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 75vh;">
    <div class="col-md-5">
        
        <div id="login-card" class="card shadow p-4 rounded-3">
            <h2 class="text-center fw-bold mb-4 text-success">Iniciar Sesión</h2>
                    
            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="login-username" class="form-label fw-semibold text-secondary">Usuario o Correo</label>
                    <input type="text" class="form-control" id="login-username" name="username" required>
                </div>
                <div class="mb-3">
                    <label for="login-password" class="form-label fw-semibold text-secondary">Contraseña</label>
                    <input type="password" class="form-control" id="login-password" name="password" required>
                </div>
                <button type="submit" class="btn btn-success w-100 fw-bold mt-2">Ingresar</button>
            </form>
            
            <div class="text-center mt-4">
                <p class="mb-0 small text-muted">¿No tienes una cuenta?</p>
                <button type="button" class="btn btn-link btn-sm text-success fw-bold p-0" onclick="mostrarRegistro()">Registrarse</button>
            </div>
        </div>

        <div id="register-card" class="card shadow p-4 rounded-3 d-none">
            <h2 class="text-center fw-bold mb-4 text-success">Registrarse</h2>
            <form method="POST" action="{% url 'register' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="reg-username" class="form-label fw-semibold text-secondary">Nombre de Usuario</label>
                    <input type="text" class="form-control" id="reg-username" name="username" required>
                </div>
                <div class="mb-3">
                    <label for="reg-email" class="form-label fw-semibold text-secondary">Correo Electrónico</label>
                    <input type="email" class="form-control" id="reg-email" name="correo" required>
                </div>
                <div class="mb-3">
                    <label for="reg-password" class="form-label fw-semibold text-secondary">Contraseña</label>
                    <input type="password" class="form-control" id="reg-password" name="password" required>
                </div>
                <div class="mb-3">
                    <label for="reg-rol" class="form-label fw-semibold text-secondary">Rol del Sistema</label>
                    <select class="form-select" id="reg-rol" name="rol" required>
                        <option value="1">Usuario Común</option>
                        <option value="2">Administrador</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-success w-100 fw-bold mt-2">Crear Cuenta</button>
            </form>

            <div class="text-center mt-4">
                <p class="mb-0 small text-muted">¿Ya tienes cuenta?</p>
                <button type="button" class="btn btn-link btn-sm text-success fw-bold p-0" onclick="mostrarLogin()">Iniciar Sesión</button>
            </div>
        </div>

    </div>
</div>

<script>
    const loginCard = document.getElementById('login-card');
    const registerCard = document.getElementById('register-card');

    function mostrarRegistro() {
        loginCard.classList.add('d-none');
        registerCard.classList.remove('d-none');
    }

    function mostrarLogin() {
        registerCard.classList.add('d-none');
        loginCard.classList.remove('d-none');
    }
</script>
{% endblock %}
